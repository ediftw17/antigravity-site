<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body {
    width: 1200px;
    height: 630px;
    background: #0a0a0a;
    font-family: 'Inter', system-ui, sans-serif;
    color: #f5f5f5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
    position: relative;
    overflow: hidden;
  }
  .glow {
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(245,245,245,0.03) 0%, transparent 70%);
    pointer-events: none;
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .mark {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 32px;
    opacity: 0.4;
  }
  .title {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 24px;
  }
  .subtitle {
    font-size: 24px;
    color: #6b6b6b;
    line-height: 1.5;
    max-width: 700px;
  }
  .bottom {
    position: absolute;
    bottom: 60px;
    left: 80px;
    right: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 24px;
  }
  .url {
    font-size: 18px;
    color: #6b6b6b;
    letter-spacing: 0.05em;
  }
  .services {
    font-size: 14px;
    color: #3a3a3a;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="grid"></div>
  <div class="mark">N</div>
  <h1 class="title">Websites that<br>get you customers.</h1>
  <p class="subtitle">Professional websites for local businesses. Built fast, designed to convert.</p>
  <div class="bottom">
    <span class="url">nule.io</span>
    <span class="services">HVAC &middot; DENTAL &middot; LAW &middot; RESTAURANTS &middot; MORE</span>
  </div>
</body>
</html>
